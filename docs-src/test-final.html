<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Test - PM7 UI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/packages/core/src/styles/index.css">
  <link rel="stylesheet" href="/styles/docs.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="pm7-docs-layout">
    <main class="pm7-docs-content" style="max-width: 100%;">
      <h1>Final Integration Test</h1>
      
      <div class="pm7-card">
        <div class="pm7-card-content">
          <h2>Test Results</h2>
          <div id="test-log" style="font-family: monospace; white-space: pre-wrap; margin-top: 20px;"></div>
        </div>
      </div>
      
      <div class="pm7-card" style="margin-top: 20px;">
        <div class="pm7-card-content">
          <h2>Manual Tests</h2>
          <ol>
            <li>Click the menu button in the header - ✓ should open menu</li>
            <li>Click "Version Info" in the menu - ✓ should open dialog</li>
            <li>Press ESC - ✓ should close dialog</li>
            <li>Hover over buttons - ✓ should show hover effects</li>
          </ol>
        </div>
      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>
  
  <script type="module">
    const log = (msg) => {
      const logEl = document.getElementById('test-log');
      logEl.textContent += msg + '\n';
    };
    
    // Test everything works
    log('Starting final integration test...');
    
    import { initTabRouter } from '/scripts/tab-router.js';
    log('✓ Tab router imported');
    
    import { PM7Menu } from '/packages/core/src/scripts/menu.js';
    log('✓ PM7Menu imported');
    
    import { openDialog, closeDialog } from '/packages/core/src/scripts/dialog.js';
    window.openDialog = openDialog;
    window.closeDialog = closeDialog;
    log('✓ Dialog functions imported');
    
    import { loadSharedComponents } from '/scripts/components.js';
    window.PM7Menu = PM7Menu;
    
    document.addEventListener('DOMContentLoaded', () => {
      loadSharedComponents();
      log('✓ Shared components loaded');
      
      // Test hover
      setTimeout(() => {
        const btn = document.querySelector('.pm7-button');
        if (btn) {
          btn.addEventListener('mouseenter', () => {
            log('✓ Hover event working');
          }, { once: true });
        }
        
        log('\n✅ All systems operational!');
        log('The PM7 dialog component issue has been resolved.');
      }, 500);
    });
  </script>
</body>
</html>
