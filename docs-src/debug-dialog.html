<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Dialog Integration - pm7-ui</title>
  <link rel="stylesheet" href="/packages/core/src/styles/index.css">
  <link rel="stylesheet" href="/styles/docs.css">
</head>
<body>
  <h1>Debug Dialog Integration</h1>
  
  <div id="log" style="background: #f5f5f5; padding: 20px; margin: 20px 0; font-family: monospace; white-space: pre-wrap;"></div>
  
  <button onclick="runTest()">Run Full Integration Test</button>
  
  <div id="header-placeholder"></div>
  <div id="footer-placeholder"></div>
  
  <script>
    const log = (msg) => {
      const logEl = document.getElementById('log');
      logEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
      console.log(msg);
    };
    
    window.runTest = async function() {
      log('Starting integration test...');
      
      try {
        // Step 1: Import menu.js
        log('Step 1: Importing menu.js...');
        const menuModule = await import('/packages/core/src/scripts/menu.js');
        window.PM7Menu = menuModule.PM7Menu;
        log('✓ Menu.js loaded successfully');
        
        // Step 2: Import dialog.js
        log('Step 2: Importing dialog.js...');
        const dialogModule = await import('/packages/core/src/scripts/dialog.js');
        window.openDialog = dialogModule.openDialog;
        window.closeDialog = dialogModule.closeDialog;
        log('✓ Dialog.js loaded successfully');
        
        // Step 3: Import components.js
        log('Step 3: Importing components.js...');
        const componentsModule = await import('/scripts/components.js');
        log('✓ Components.js loaded successfully');
        
        // Step 4: Load shared components
        log('Step 4: Loading shared components...');
        componentsModule.loadSharedComponents();
        log('✓ Shared components loaded');
        
        // Step 5: Wait and check
        log('Step 5: Waiting for DOM updates...');
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // Check if menu exists
        const menuEl = document.querySelector('[data-pm7-menu]');
        log(menuEl ? '✓ Menu element found' : '✗ Menu element NOT found');
        
        // Check if dialog exists
        const dialogEl = document.querySelector('[data-pm7-dialog="version-dialog"]');
        log(dialogEl ? '✓ Dialog element found' : '✗ Dialog element NOT found');
        
        // Step 6: Test version dialog
        log('Step 6: Testing version dialog...');
        if (window.showVersionDialog) {
          window.showVersionDialog();
          log('✓ showVersionDialog called');
        } else {
          log('✗ showVersionDialog not found');
        }
        
        log('Integration test completed!');
        
      } catch (error) {
        log(`ERROR: ${error.message}`);
        console.error(error);
      }
    };
  </script>
</body>
</html>
